name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to release, for example v1.2.3
        required: true
      release_name:
        description: Optional release title override
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm package version
        run: |
          VERSION=${INPUT_TAG#v}
          cd npm
          npm version "$VERSION" --no-git-tag-version
        env:
          INPUT_TAG: ${{ inputs.tag }}

      - name: Unpublish npm version if it exists
        continue-on-error: true
        run: |
          VERSION=${INPUT_TAG#v}
          npm unpublish "@xdevplatform/xurl@${VERSION}" --registry=https://registry.npmjs.org
        env:
          INPUT_TAG: ${{ inputs.tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update release title
        if: ${{ inputs.release_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ inputs.tag }}" --repo "$GH_REPO" --title "${{ inputs.release_name }}"
